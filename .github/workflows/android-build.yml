name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          ls -lah
          find app -maxdepth 5 -type f | sort | head -300

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        run: |
          mkdir -p ci-logs
          gradle assembleDebug --stacktrace --warning-mode all --console plain > ci-logs/gradle-build.log 2>&1

      - name: Print build log if failed
        if: failure()
        run: |
          cat ci-logs/gradle-build.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-logs
          path: ci-logs/gradle-build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PingPongGo-Host-debug-apk
          path: app/build/outputs/apk/debug/*.apk

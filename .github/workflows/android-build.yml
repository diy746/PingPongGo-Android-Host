name: Build Android APK - Diagnostic

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          find . -maxdepth 4 -type f | sort | head -300

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Check project files
        run: |
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f app/build.gradle.kts
          test -f app/src/main/AndroidManifest.xml
          test -d app/src/main/assets/www

      - name: Build debug APK with full logs
        run: |
          gradle assembleDebug --stacktrace --info --warning-mode all

      - name: List APK outputs
        if: always()
        run: |
          find app/build -type f | sort | tail -200 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PingPongGo-Host-debug-apk
          path: app/build/outputs/apk/debug/*.apk
